# Spring Application Name
spring.application.name=foodhub

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:foodhubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA & Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# SQL Initialization Settings (Executes schema.sql and data.sql)
spring.sql.init.mode=always

# Server Port
server.port=8080

# Thymeleaf caching disabled for development (if needed, otherwise default)
spring.thymeleaf.cache=false
