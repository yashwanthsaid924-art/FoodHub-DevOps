<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/header :: header-files}"></div>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Navbar Navigation -->
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div style="height: 72px;"></div> <!-- Spacer for fixed navbar -->

    <!-- PAGE HEADER -->
    <div class="bg-dark text-white py-4 mb-5" style="background: linear-gradient(135deg, #1b2030, #282c3f);">
        <div class="container text-center text-md-start">
            <h1 class="font-outfit fw-bold m-0" th:text="${foodItemDTO.id != null} ? 'Edit Food Item' : 'Add New Food Item'">Add Food Item</h1>
            <p class="text-white-50 font-inter m-0">Provide details for the food catalog item below</p>
        </div>
    </div>

    <!-- FORM BODY -->
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white font-inter">
                    
                    <form th:action="@{/admin/food/save}" th:object="${foodItemDTO}" method="POST">
                        <!-- Hidden ID field -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Restaurant Dropdown -->
                        <div class="mb-4">
                            <label for="restaurantId" class="form-label fw-bold">Select Restaurant Partner</label>
                            <select class="form-select rounded-3" id="restaurantId" th:field="*{restaurantId}" th:classappend="${#fields.hasErrors('restaurantId')} ? 'is-invalid' : ''">
                                <option value="">-- Choose Restaurant --</option>
                                <option th:each="r : ${restaurants}" th:value="${r.id}" th:text="${r.name}">Burger King</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('restaurantId')}" th:errors="*{restaurantId}">Associated restaurant is required</div>
                        </div>

                        <!-- Food Item Name -->
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold">Food Item Name</label>
                            <input type="text" class="form-control rounded-3" id="name" th:field="*{name}" placeholder="e.g. Pepperoni Pizza" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name is required</div>
                        </div>

                        <!-- Price & Category (Inline) -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="price" class="form-label fw-bold">Price (INR)</label>
                                <input type="number" step="0.01" class="form-control rounded-3" id="price" th:field="*{price}" placeholder="199.00" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price is required</div>
                            </div>
                            <div class="col-md-6">
                                <label for="category" class="form-label fw-bold">Food Category</label>
                                <select class="form-select rounded-3" id="category" th:field="*{category}" th:classappend="${#fields.hasErrors('category')} ? 'is-invalid' : ''">
                                    <option value="Pizza">Pizza</option>
                                    <option value="Burger">Burger</option>
                                    <option value="Biryani">Biryani</option>
                                    <option value="South Indian">South Indian</option>
                                    <option value="Chinese">Chinese</option>
                                    <option value="Desserts">Desserts</option>
                                    <option value="Drinks">Drinks</option>
                                    <option value="Healthy Food">Healthy Food</option>
                                    <option value="Fast Food">Fast Food</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Category is required</div>
                            </div>
                        </div>

                        <!-- Diet Type (Veg / Non-Veg Indicator) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">Diet Preference</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="isVegTrue" th:field="*{isVeg}" th:value="true" checked>
                                <label class="form-check-label fs-sm" for="isVegTrue">
                                    <span class="veg-badge me-1"></span> Vegetarian
                                </label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="isVegFalse" th:field="*{isVeg}" th:value="false">
                                <label class="form-check-label fs-sm" for="isVegFalse">
                                    <span class="nonveg-badge me-1"></span> Non-Vegetarian
                                </label>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Description Details</label>
                            <textarea class="form-control rounded-3" id="description" th:field="*{description}" rows="3" placeholder="Describe the taste, size, or ingredients..."></textarea>
                        </div>

                        <!-- Image URL -->
                        <div class="mb-4">
                            <label for="imageUrl" class="form-label fw-bold">Food Image URL</label>
                            <input type="text" class="form-control rounded-3" id="imageUrl" th:field="*{imageUrl}" placeholder="https://images.unsplash.com/photo-..." th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}">Image URL is required</div>
                            <div class="form-text text-muted fs-xs">Use a standard high quality image link from free sources like Unsplash.</div>
                        </div>

                        <!-- Submit Buttons -->
                        <div class="d-flex justify-content-end gap-3 mt-5">
                            <a th:href="@{/admin}" class="btn btn-outline-dark rounded-pill px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">
                                <i class="bi bi-save me-1"></i> Save Dish
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
