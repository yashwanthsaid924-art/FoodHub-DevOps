apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodhub-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foodhub
  template:
    metadata:
      labels:
        app: foodhub
    spec:
      containers:
      - name: foodhub-container
        image: foodhubacr12345.azurecr.io/foodhub:20
        ports:
        - containerPort: 8080