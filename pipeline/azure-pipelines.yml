trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscriptionConnection: 'foodhubacr12345'
  acrLoginServer: 'foodhubacr12345.azurecr.io'
  imageRepository: 'foodhub-app'
  dockerfilePath: 'Dockerfile'

stages:

# ==========================
# Build Stage
# ==========================
- stage: Build
  displayName: Build Stage

  jobs:
  - job: MavenBuild
    displayName: Maven Build

    steps:

    - task: JavaToolInstaller@0
      inputs:
        versionSpec: '17'
        jdkSourceOption: 'PreInstalled'
        jdkArchitectureOption: 'x64'

    - task: Maven@3
      displayName: Maven Package
      inputs:
        mavenPomFile: 'app/pom.xml'
        goals: 'clean package'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: 'foodhubacr12345'
        repository: 'foodhub-app'
        Dockerfile: 'Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          latest
          $(Build.BuildId)

# ==========================
# Deploy Stage
# ==========================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployToAKS
    displayName: Deploy Application

    environment: default

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: KubernetesManifest@1
            displayName: Deploy to AKS
            inputs:
              action: deploy
              kubernetesServiceConnection: 'foodhub-aks-default'
              namespace: default
              manifests: |
                kubernetes/deployment.yaml
                kubernetes/service.yaml
              containers: |
                foodhubacr12345.azurecr.io/foodhub-app:$(Build.BuildId)